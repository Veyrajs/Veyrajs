packages:
  - 'packages/*'
  - 'apps/*'

# Centralized dependency versions (pnpm catalogs). Packages reference these with
# "catalog:" so versions never drift across the monorepo.
catalog:
  typescript: ^5.7.3
  tsup: ^8.3.5
  vitest: ^2.1.8
  happy-dom: ^15.11.7
  vue: ^3.5.13
  vite: ^6.0.7
  '@vitejs/plugin-vue': ^5.2.1
  '@vue/test-utils': ^2.4.6
  vue-tsc: ^2.1.10
  '@biomejs/biome': 1.9.4
  '@changesets/cli': ^2.27.11
