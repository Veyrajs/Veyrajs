packages:
  - 'packages/*'
  - 'apps/*'

# Centralized dependency versions (pnpm catalogs). Packages reference these with
# "catalog:" so versions never drift across the monorepo.
catalog:
  typescript: ^5.7.3
  tsup: ^8.3.5
  vitest: ^2.1.8
  happy-dom: ^15.11.7
  vue: ^3.5.13
  vite: ^6.0.7
  '@vitejs/plugin-vue': ^5.2.1
  '@vue/test-utils': ^2.4.6
  vue-tsc: ^2.1.10
  '@biomejs/biome': 1.9.4
  '@changesets/cli': ^2.27.11
  tinybench: ^2.9.0
  react: ^18.3.1
  react-dom: ^18.3.1
  '@types/react': ^18.3.12
  '@types/react-dom': ^18.3.1
  svelte: ^5.19.0
  '@sveltejs/package': ^2.3.7
  '@sveltejs/vite-plugin-svelte': ^5.0.3
  svelte-check: ^4.1.4
  '@testing-library/svelte': ^5.2.6
  '@angular/core': ^18.2.13
  '@angular/common': ^18.2.13
  '@angular/compiler': ^18.2.13
  '@angular/compiler-cli': ^18.2.14
  '@angular/platform-browser': ^18.2.13
  '@angular/platform-browser-dynamic': ^18.2.13
  zone.js: ^0.14.10
  ng-packagr: ^18.2.1
